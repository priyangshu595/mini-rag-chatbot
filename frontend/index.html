<!DOCTYPE html>
<html>
<head>
    <title>Mini RAG Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #343541;
            color: white;
            margin: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 15px;
            max-width: 70%;
            padding: 12px;
            border-radius: 10px;
        }

        .user {
            background: #10a37f;
            align-self: flex-end;
        }

        .bot {
            background: #444654;
            align-self: flex-start;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background: #40414f;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #10a37f;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .context {
            font-size: 12px;
            color: #ccc;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="container">
    <div id="chat" class="chat"></div>

    <div class="input-box">
        <input id="query" placeholder="Ask something..." />
        <button onclick="ask()">Send</button>
    </div>
</div>

<script>
async function ask() {
    const input = document.getElementById("query");
    const chat = document.getElementById("chat");
    const query = input.value;

    if (!query) return;

   
    chat.innerHTML += `<div class="message user">${query}</div>`;
    input.value = "";

    
    chat.innerHTML += `<div class="message bot" id="loading">Typing...</div>`;
    chat.scrollTop = chat.scrollHeight;

    try {
        const res = await fetch(`http://127.0.0.1:8000/ask?query=${query}`);
        const data = await res.json();

        document.getElementById("loading").remove();

        
        chat.innerHTML += `
            <div class="message bot">
                ${data.answer
    .replace(/ - /g, "<br>• ")
    .replace(/^- /, "• ")
    .replace(/\n/g, "<br>")}
                <div class="context"><b>Context:</b><br>${data.retrieved_context.join("<br><br>")}</div>
            </div>
        `;

    } catch (err) {
        document.getElementById("loading").remove();
        chat.innerHTML += `<div class="message bot">Error connecting to server</div>`;
    }

    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
